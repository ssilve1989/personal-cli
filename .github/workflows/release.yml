name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false  # required for @semantic-release/git push

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run lint:ci

      - run: bun test

      - id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build binaries
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build cross-platform binaries
        run: |
          bun build --compile --target=bun-linux-x64 ./src/index.ts --outfile dist/scli-linux-x64
          bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile dist/scli-macos-arm64
          bun build --compile --target=bun-darwin-x64 ./src/index.ts --outfile dist/scli-macos-x64

      - name: Upload binaries to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ needs.release.outputs.new_release_version }} \
            dist/scli-linux-x64 \
            dist/scli-macos-arm64 \
            dist/scli-macos-x64 \
            --clobber
